name: Build APK and EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION_NAME: 1.0.${{ github.run_number }}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"

      - name: Build signed release APK
        run: gradle assembleRelease

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk Fonocam-v1.0.${{ github.run_number }}.apk
          cp app/build/outputs/apk/release/app-release.apk Fonocam.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fonocam-APK
          path: Fonocam-v*.apk

      - name: Publish release (for in-app updates)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Fonocam v1.0.${{ github.run_number }}
          files: |
            Fonocam-v*.apk
            Fonocam.apk

  build-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install customtkinter opencv-python pyvirtualcam pillow "numpy<2" av pyinstaller

      - name: Bundle adb (USB mode works out of the box)
        run: |
          curl -L -o pt.zip https://dl.google.com/android/repository/platform-tools-latest-windows.zip
          Expand-Archive pt.zip -DestinationPath pt
          mkdir adb
          copy pt\platform-tools\adb.exe adb\
          copy pt\platform-tools\AdbWinApi.dll adb\
          copy pt\platform-tools\AdbWinUsbApi.dll adb\

      - name: Fetch Unity Capture driver (virtual camera, no OBS needed)
        run: curl -L -o UnityCaptureFilter64bit.dll https://raw.githubusercontent.com/schellingb/UnityCapture/master/Install/UnityCaptureFilter64bit.dll

      - name: Build Fonocam.exe
        run: pyinstaller --noconfirm --onefile --windowed --name Fonocam --icon fonocam.ico --add-data "fonocam.ico;." --add-data "adb;adb" --add-data "fonts;fonts" --collect-all customtkinter Fonocam_Desktop.py

      - name: Build installer (Inno Setup)
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=1.0.${{ github.run_number }} installer.iss'

      - name: Rename outputs
        run: |
          copy dist\Fonocam.exe Fonocam-Portable-v1.0.${{ github.run_number }}.exe
          copy dist\Fonocam-Setup.exe Fonocam-Setup-v1.0.${{ github.run_number }}.exe
          copy dist\Fonocam-Setup.exe Fonocam-Setup.exe

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fonocam-Desktop-EXE
          path: |
            Fonocam-Setup-v*.exe
            Fonocam-Portable-v*.exe

      - name: Attach EXE to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: |
            Fonocam-Setup-v*.exe
            Fonocam-Setup.exe
            Fonocam-Portable-v*.exe
