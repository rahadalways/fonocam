<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Webcam Streamer - Mobile Client</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      user-select: none;
      -webkit-user-select: none;
    }
    video {
      transform: scaleX(1);
    }
    .mirrored {
      transform: scaleX(-1);
    }
  </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between overflow-hidden">

  <!-- Floating Header Status -->
  <div class="p-4 bg-slate-950/80 backdrop-blur-md border-b border-slate-800 flex items-center justify-between z-10">
    <div class="flex items-center space-x-2">
      <div class="bg-indigo-600 p-1.5 rounded-lg text-white">
        <i data-lucide="videocam" class="w-4 h-4"></i>
      </div>
      <div>
        <h1 class="text-xs font-bold uppercase tracking-wider">Mobile Streamer</h1>
        <p id="capture-resolution" class="text-[10px] text-slate-400 font-mono">Camera Offline</p>
      </div>
    </div>

    <!-- Signaling Status Badge -->
    <div class="flex items-center bg-slate-900 px-3 py-1 rounded-full border border-slate-800">
      <span class="relative flex h-2 w-2 mr-2">
        <span id="status-pulse" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
        <span id="status-indicator" class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span>
      </span>
      <span id="status-text" class="text-[10px] font-bold uppercase text-red-400 tracking-wider">OFFLINE</span>
    </div>
  </div>

  <!-- Main Camera Viewport -->
  <div class="relative flex-1 bg-black flex items-center justify-center overflow-hidden">
    <!-- Camera Preview Element -->
    <video id="preview-video" autoplay playsinline muted class="w-full h-full object-cover transition-transform duration-300"></video>

    <!-- Tap to Start Overlay -->
    <div id="permission-warning" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center p-6 text-center z-20">
      <div class="bg-slate-900 p-4 rounded-full border border-slate-800 mb-4 text-indigo-400">
        <i data-lucide="camera" class="w-10 h-10"></i>
      </div>
      <h2 class="text-base font-bold text-white mb-2">Requesting Media Stream...</h2>
      <p class="text-xs text-slate-400 max-w-xs mb-6">
        Click below to authorize camera and microphone feeds.
      </p>
      <button id="btn-request-media" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl text-sm font-semibold transition shadow-lg shadow-indigo-600/30">
        Authorize Stream
      </button>
    </div>

    <!-- Stream Controls (Floating Left) -->
    <div class="absolute right-4 top-4 flex flex-col space-y-3 z-10">
      <!-- Resolution / Target Specs Widget -->
      <div class="bg-slate-950/80 backdrop-blur-md px-3 py-1.5 rounded-lg border border-slate-800 text-right">
        <span class="text-[9px] uppercase font-bold text-slate-500">FPS / Target</span>
        <p id="stats-fps" class="text-[11px] font-mono font-bold text-indigo-400">0 FPS</p>
      </div>
    </div>
  </div>

  <!-- Bottom Panel Controls -->
  <div class="bg-slate-950/90 backdrop-blur-lg border-t border-slate-800 px-6 py-6 pb-8 z-10">
    <div class="grid grid-cols-4 gap-4 max-w-sm mx-auto">
      
      <!-- Video Toggle -->
      <button id="btn-toggle-video" class="flex flex-col items-center justify-center space-y-1.5 py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300">
        <i data-lucide="video" class="w-5 h-5" id="icon-video"></i>
        <span class="text-[9px] font-semibold uppercase tracking-wider" id="lbl-video">Pause</span>
      </button>

      <!-- Audio Mute Toggle -->
      <button id="btn-toggle-audio" class="flex flex-col items-center justify-center space-y-1.5 py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300">
        <i data-lucide="mic" class="w-5 h-5" id="icon-audio"></i>
        <span class="text-[9px] font-semibold uppercase tracking-wider" id="lbl-audio">Mute</span>
      </button>

      <!-- Switch Camera (Front/Back) -->
      <button id="btn-switch-camera" class="flex flex-col items-center justify-center space-y-1.5 py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300">
        <i data-lucide="switch-camera" class="w-5 h-5"></i>
        <span class="text-[9px] font-semibold uppercase tracking-wider">Flip</span>
      </button>

      <!-- Mirror output -->
      <button id="btn-mirror-view" class="flex flex-col items-center justify-center space-y-1.5 py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300">
        <i data-lucide="flip-horizontal" class="w-5 h-5"></i>
        <span class="text-[9px] font-semibold uppercase tracking-wider">Mirror</span>
      </button>

    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // DOM Elements
    const previewVideo = document.getElementById('preview-video');
    const permissionWarning = document.getElementById('permission-warning');
    const btnRequestMedia = document.getElementById('btn-request-media');
    
    // Status badges
    const statusPulse = document.getElementById('status-pulse');
    const statusIndicator = document.getElementById('status-indicator');
    const statusText = document.getElementById('status-text');
    const captureResolution = document.getElementById('capture-resolution');
    const statsFps = document.getElementById('stats-fps');

    // Controls
    const btnToggleVideo = document.getElementById('btn-toggle-video');
    const btnToggleAudio = document.getElementById('btn-toggle-audio');
    const btnSwitchCamera = document.getElementById('btn-switch-camera');
    const btnMirrorView = document.getElementById('btn-mirror-view');

    const iconVideo = document.getElementById('icon-video');
    const iconAudio = document.getElementById('icon-audio');
    const lblVideo = document.getElementById('lbl-video');
    const lblAudio = document.getElementById('lbl-audio');

    // WebRTC & Streaming States
    let webSocket = null;
    let peerConnection = null;
    let localStream = null;
    let currentFacingMode = 'environment'; // default back camera
    let isVideoEnabled = true;
    let isAudioEnabled = true;

    // WebRTC STUN Configurations
    const rtcConfig = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' }
      ]
    };

    // Camera FPS counter
    let lastFrameTime = performance.now();
    let frameCount = 0;
    let activeFps = 30;

    // Initialize Local Media Capture
    async function startMediaCapture() {
      try {
        if (localStream) {
          localStream.getTracks().forEach(track => track.stop());
        }

        const constraints = {
          video: {
            facingMode: currentFacingMode,
            width: { ideal: 1920, max: 3840 },
            height: { ideal: 1080, max: 2160 },
            frameRate: { ideal: 30, max: 60 }
          },
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        };

        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        previewVideo.srcObject = localStream;
        permissionWarning.classList.add('hidden');

        // Update resolution badge
        const videoTrack = localStream.getVideoTracks()[0];
        const settings = videoTrack.getSettings();
        captureResolution.innerText = `${settings.width}x${settings.height} @ ${Math.round(settings.frameRate || 30)}Hz`;

        // Apply initial controls state
        localStream.getVideoTracks().forEach(t => t.enabled = isVideoEnabled);
        localStream.getAudioTracks().forEach(t => t.enabled = isAudioEnabled);

        // Render FPS counter dynamically
        startFpsCounter();

        // Initialize Signaling once stream is ready
        if (!webSocket) {
          initializeSignaling();
        } else {
          // If connection exists, swap WebRTC tracks on the fly
          await replaceTracksOnPeerConnection();
        }

      } catch (err) {
        console.error('Failed to get media devices:', err);
        alert('Permission Denied or Camera Busy. Please authorize Camera and Microphone access in your browser or application permissions settings.');
      }
    }

    // Replace tracks dynamically on active RTCPeerConnection (Smooth switching)
    async function replaceTracksOnPeerConnection() {
      if (!peerConnection) return;
      
      const senders = peerConnection.getSenders();
      const videoTrack = localStream.getVideoTracks()[0];
      const audioTrack = localStream.getAudioTracks()[0];

      for (const sender of senders) {
        if (sender.track && sender.track.kind === 'video' && videoTrack) {
          await sender.replaceTrack(videoTrack);
        }
        if (sender.track && sender.track.kind === 'audio' && audioTrack) {
          await sender.replaceTrack(audioTrack);
        }
      }
      console.log('WebRTC streams updated successfully.');
    }

    // Connect to Node.js server via WS signaling
    function initializeSignaling() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}`;
      
      console.log(`Connecting to WebSocket Server: ${wsUrl}`);
      webSocket = new WebSocket(wsUrl);

      webSocket.onopen = () => {
        console.log('Signaling server connected.');
        // Register client as the camera sender
        webSocket.send(JSON.stringify({ type: 'register', role: 'sender' }));
        updateSignalingStatus(true);
      };

      webSocket.onmessage = async (event) => {
        const message = JSON.parse(event.data);

        switch (message.type) {
          case 'initiate':
            console.log('Initiate received from PC receiver. Negotiating WebRTC Connection...');
            await createSDPOffer();
            break;

          case 'answer':
            console.log('SDP Answer received from PC receiver.');
            if (peerConnection) {
              await peerConnection.setRemoteDescription(new RTCSessionDescription(message.answer));
            }
            break;

          case 'ice-candidate':
            if (peerConnection && message.candidate) {
              try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(message.candidate));
              } catch (e) {
                console.error('Error adding ICE Candidate:', e);
              }
            }
            break;

          case 'peer-disconnected':
            console.log('PC receiver disconnected.');
            resetPeerConnection();
            break;
        }
      };

      webSocket.onclose = () => {
        console.log('Signaling closed. Retrying...');
        updateSignalingStatus(false);
        setTimeout(initializeSignaling, 3000);
      };

      webSocket.onerror = (err) => {
        console.error('Signaling connection error:', err);
      };
    }

    // Create SDP Offer to send to the PC receiver
    async function createSDPOffer() {
      resetPeerConnection(); // Clear existing

      peerConnection = new RTCPeerConnection(rtcConfig);

      // Add local media stream tracks
      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      // ICE candidates relay
      peerConnection.onicecandidate = (event) => {
        if (event.candidate && webSocket && webSocket.readyState === WebSocket.OPEN) {
          webSocket.send(JSON.stringify({
            type: 'ice-candidate',
            candidate: event.candidate
          }));
        }
      };

      // Set and send offer
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      webSocket.send(JSON.stringify({
        type: 'offer',
        offer: offer
      }));
    }

    // Reset WebRTC Connection safely
    function resetPeerConnection() {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
    }

    // Update Connection State UI
    function updateSignalingStatus(connected = false) {
      if (connected) {
        statusIndicator.className = 'relative inline-flex rounded-full h-2 w-2 bg-emerald-500';
        statusPulse.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75';
        statusText.innerText = 'STREAMING';
        statusText.className = 'text-[10px] font-bold uppercase text-emerald-400 tracking-wider';
      } else {
        statusIndicator.className = 'relative inline-flex rounded-full h-2 w-2 bg-rose-500';
        statusPulse.className = 'animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75';
        statusText.innerText = 'OFFLINE';
        statusText.className = 'text-[10px] font-bold uppercase text-rose-400 tracking-wider';
        resetPeerConnection();
      }
    }

    // Camera FPS counter using requestVideoFrameCallback or requestAnimationFrame
    function startFpsCounter() {
      const render = () => {
        frameCount++;
        const now = performance.now();
        if (now - lastFrameTime >= 1000) {
          activeFps = Math.round((frameCount * 1000) / (now - lastFrameTime));
          statsFps.innerText = `${activeFps} FPS`;
          frameCount = 0;
          lastFrameTime = now;
        }
        requestAnimationFrame(render);
      };
      requestAnimationFrame(render);
    }

    // EVENT LISTENERS
    btnRequestMedia.addEventListener('click', startMediaCapture);

    // Toggle video camera feed
    btnToggleVideo.addEventListener('click', () => {
      isVideoEnabled = !isVideoEnabled;
      localStream.getVideoTracks().forEach(t => t.enabled = isVideoEnabled);
      
      if (isVideoEnabled) {
        iconVideo.setAttribute('data-lucide', 'video');
        lblVideo.innerText = 'Pause';
        btnToggleVideo.className = 'flex flex-col items-center justify-center space-y-1.5 py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300';
      } else {
        iconVideo.setAttribute('data-lucide', 'video-off');
        lblVideo.innerText = 'Resume';
        btnToggleVideo.className = 'flex flex-col items-center justify-center space-y-1.5 py-2.5 rounded-xl bg-rose-950/40 hover:bg-rose-950/60 border border-rose-900/50 text-rose-300';
      }
      lucide.createIcons();
    });

    // Toggle audio microphone feed
    btnToggleAudio.addEventListener('click', () => {
      isAudioEnabled = !isAudioEnabled;
      localStream.getAudioTracks().forEach(t => t.enabled = isAudioEnabled);

      if (isAudioEnabled) {
        iconAudio.setAttribute('data-lucide', 'mic');
        lblAudio.innerText = 'Mute';
        btnToggleAudio.className = 'flex flex-col items-center justify-center space-y-1.5 py-2.5 rounded-xl bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300';
      } else {
        iconAudio.setAttribute('data-lucide', 'mic-off');
        lblAudio.innerText = 'Unmute';
        btnToggleAudio.className = 'flex flex-col items-center justify-center space-y-1.5 py-2.5 rounded-xl bg-amber-950/40 hover:bg-amber-950/60 border border-amber-900/50 text-amber-300';
      }
      lucide.createIcons();
    });

    // Flip Camera Front/Back
    btnSwitchCamera.addEventListener('click', async () => {
      currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
      
      // Update UI preview mirror state based on front vs back
      if (currentFacingMode === 'user') {
        previewVideo.classList.add('mirrored');
      } else {
        previewVideo.classList.remove('mirrored');
      }

      await startMediaCapture();
    });

    // Mirror Output Locally for orientation help
    btnMirrorView.addEventListener('click', () => {
      previewVideo.classList.toggle('mirrored');
    });

    // Automatically request stream when viewport loads
    window.addEventListener('DOMContentLoaded', () => {
      startMediaCapture();
    });
  </script>
</body>
</html>
